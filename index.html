<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 🎈</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(to bottom, #fbc531, #f7f1e3);
            overflow: hidden;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }

        /* Container Balon */
        #balloon-container {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            top: 0;
            left: 0;
        }

        /* Style Dasar Balon */
        .balloon {
            position: absolute;
            width: 60px;
            height: 75px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            bottom: -180px; /* Disesuaikan karena tali lebih panjang */
            cursor: pointer;
            animation: floatUp 12s linear infinite; /* Sedikit diperlambat biar lebih anggun */
            display: flex;
            justify-content: center;
        }

        /* Tali Balon (DIPANJANGKAN) */
        .balloon::after {
            content: "";
            position: absolute;
            bottom: -120px; /* Panjang tali diubah dari 30px ke 60px */
            width: 1.5px;
            height: 120px;
            background-color: #888;
        }

        /* Gulungan Surat di Tali (Disesuaikan posisinya) */
        .balloon.has-letter::before {
            content: "📜";
            position: absolute;
            bottom: -120px; /* Mengikuti ujung tali yang baru */
            font-size: 16px;
            z-index: 2;
            animation: dangle 1.5s ease-in-out infinite alternate;
        }

        /* Animasi Balon Bergerak ke Atas */
        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-130vh) rotate(10deg);
                opacity: 0;
            }
        }

        /* Animasi Tali Bergoyang */
        @keyframes dangle {
            0% { transform: rotate(-10deg); }
            100% { transform: rotate(10deg); }
        }

        /* Overlay Surat / Pop-up Kata-kata */
        #letter-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10;
            cursor: pointer;
        }

        .letter-content {
            background: #fffdf0;
            padding: 30px;
            border-radius: 15px;
            max-width: 80%;
            width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 2px dashed #d1ccc0;
            transform: scale(0.7);
            transition: transform 0.3s ease;
            position: relative;
        }

        #letter-overlay.show .letter-content {
            transform: scale(1);
        }

        .letter-content p {
            font-size: 1.2rem;
            color: #2c2c54;
            line-height: 1.6;
            font-style: italic;
        }

        .hint {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div id="balloon-container"></div>

    <div id="letter-overlay">
        <div class="letter-content">
            <p id="secret-text">Pesan rahasia akan muncul di sini...</p>
            <div class="hint">Klik di mana saja untuk kembali</div>
        </div>
    </div>

    <script>
        const container = document.getElementById('balloon-container');
        const overlay = document.getElementById('letter-overlay');
        const secretText = document.getElementById('secret-text');

        const colors = ['#ff6b6b', '#ff4757', '#74b9ff', '#a29bfe', '#ffeaa7', '#fab1a0', '#fd79a8', '#55efc4'];

        // Silakan ganti/tambah isi pesan di bawah ini sesuai keinginanmu
        const messages = [
            "SELAMAT ULANG TAHUN YANG KE 21 SAYANGKUUUU, SEMOGAAA SEMUA YANG DI INGINKANN SAYANGKUUU CEPAT TERJADII YAAAA. ❤️",
            "SEMANGATTT TERUSSS ORANG HEBATKUUUU, DILANCARKANNN SEGAANYAAAA",
            "LOVEEE YOUUU, LOVEEE YOUUUU LOVEEE YOUUU, LOVEEEE YOUUU SOO MUCHHHH SAYANGGGGGGG. ❤️",
            "SAYANGGG, KAMUU ORANGG HEBATTTT BANGETTTTTTT! ✨"
            "SELAMATTT ULANG TAHUNNN SAYANGKUUU CINTAKUUUU"
            "PANJANGGG UMURRR SAYANGNYAAA AKUUUU"
            "IKAN IKAN APA YANG GA BISA BERENANG? "
        ];

        let messageIndex = 0;

        function createBalloon() {
            const balloon = document.createElement('div');
            balloon.classList.add('balloon');

            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            balloon.style.backgroundColor = randomColor;
            balloon.style.boxShadow = `inset -7px -7px 10px rgba(0,0,0,0.1), 0px 5px 10px ${randomColor}88`;

            balloon.style.left = Math.random() * 90 + '%';

            // Durasi naik sedikit diperlambat (antara 8 sampai 14 detik) agar tidak terburu-buru
            const duration = Math.random() * 6 + 8;
            balloon.style.animationDuration = duration + 's';

            // Peluang balon membawa surat (diatur 40% karena jumlah balon sekarang lebih sedikit)
            const hasLetter = Math.random() < 0.4;
            if (hasLetter) {
                balloon.classList.add('has-letter');
                const currentMessage = messages[messageIndex % messages.length];
                balloon.dataset.message = currentMessage;
                messageIndex++;
            }

            balloon.addEventListener('click', (e) => {
                e.stopPropagation();
                
                if (balloon.classList.contains('has-letter')) {
                    secretText.innerText = balloon.dataset.message;
                    overlay.style.display = 'flex';
                    setTimeout(() => overlay.classList.add('show'), 10);
                }
                
                balloon.remove();
            });

            balloon.addEventListener('animationend', () => {
                balloon.remove();
            });

            container.appendChild(balloon);
        }

        // SPAWN BALLOON DIKURANGI: diubah ke 1500ms (1.5 detik sekali)
        setInterval(createBalloon, 1500);

        overlay.addEventListener('click', () => {
            overlay.classList.remove('show');
            setTimeout(() => overlay.style.display = 'none', 300);
        });
    </script>
</body>
</html>
