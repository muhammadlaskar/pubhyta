<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sayang! 🎈</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* Menggunakan gambar bebek pink sebagai background */
            background-image: url('BEBEK.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            overflow: hidden;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }

        /* Teks Ucapan di Tengah Halaman (Putih) */
        .center-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.8rem;
            font-weight: bold;
            color: #ffffff; /* Warna Putih */
            text-align: center;
            z-index: 10;
            pointer-events: none;
            text-shadow: 2px 4px 10px rgba(0, 0, 0, 0.3); /* Shadow agar teks putih terbaca jelas */
            font-family: 'Comic Sans MS', cursive, sans-serif;
            animation: pulse 2s ease-in-out infinite;
            width: 90%;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
        }

        /* Dekorasi Bunga Pink di Sudut */
        .flower {
            position: absolute;
            font-size: 50px;
            z-index: 15;
            pointer-events: none;
            animation: spinFlower 6s linear infinite;
            user-select: none;
        }

        /* Posisi Sudut */
        .top-left { top: 20px; left: 20px; }
        .top-right { top: 20px; right: 20px; }
        .bottom-left { bottom: 20px; left: 20px; }
        .bottom-right { bottom: 20px; right: 20px; }

        @keyframes spinFlower {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Container Balon */
        #balloon-container {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            top: 0;
            left: 0;
        }

        /* Style Dasar Balon */
        .balloon {
            position: absolute;
            width: 65px;
            height: 80px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            bottom: -250px; /* Lebih dalam karena tali panjang */
            cursor: pointer;
            animation: floatUp 15s linear infinite;
            display: flex;
            justify-content: center;
            z-index: 5;
        }

        /* Tali Balon (DIPANJANGKAN ke 120px) */
        .balloon::after {
            content: "";
            position: absolute;
            bottom: -120px; /* Panjang tali 120px */
            width: 1.5px;
            height: 120px;
            background-color: rgba(255, 255
