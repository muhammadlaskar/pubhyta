<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 🎈</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(to bottom, #fbc531, #f7f1e3);
            overflow: hidden;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }

        /* Container Balon */
        #balloon-container {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            top: 0;
            left: 0;
        }

        /* Style Dasar Balon */
        .balloon {
            position: absolute;
            width: 60px;
            height: 75px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            bottom: -150px;
            cursor: pointer;
            animation: floatUp 10s linear infinite;
            display: flex;
            justify-content: center;
        }

        /* Tali Balon */
        .balloon::after {
            content: "";
            position: absolute;
            bottom: -30px;
            width: 2px;
            height: 30px;
            background-color: #888;
        }

        /* Gulungan Surat di Tali */
        .balloon.has-letter::before {
            content: "📜";
            position: absolute;
            bottom: -35px;
            font-size: 16px;
            z-index: 2;
            animation: dangle 1.5s ease-in-out infinite alternate;
        }

        /* Animasi Balon Bergerak ke Atas */
        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-120vh) rotate(10deg);
                opacity: 0;
            }
        }

        /* Animasi Tali Bergoyang */
        @keyframes dangle {
            0% { transform: rotate(-10deg); }
            100% { transform: rotate(10deg); }
        }

        /* Overlay Surat / Pop-up Kata-kata */
        #letter-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10;
            cursor: pointer; /* Klik di mana saja untuk menutup */
        }

        .letter-content {
            background: #fffdf0;
            padding: 30px;
            border-radius: 15px;
            max-width: 80%;
            width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 2px dashed #d1ccc0;
            transform: scale(0.7);
            transition: transform 0.3s ease;
            position: relative;
        }

        #letter-overlay.show .letter-content {
            transform: scale(1);
        }

        .letter-content p {
            font-size: 1.2rem;
            color: #2c2c54;
            line-height: 1.6;
            font-style: italic;
        }

        .hint {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <!-- Wadah tempat balon akan muncul -->
    <div id="balloon-container"></div>

    <!-- Pop-up Surat Konten -->
    <div id="letter-overlay" id="overlay">
        <div class="letter-content">
            <p id="secret-text">Pesan rahasia akan muncul di sini...</p>
            <div class="hint">Klik di mana saja untuk kembali</div>
        </div>
    </div>

    <script>
        const container = document.getElementById('balloon-container');
        const overlay = document.getElementById('letter-overlay');
        const secretText = document.getElementById('secret-text');

        // Daftar warna balon yang estetik/pastel
        const colors = ['#ff6b6b', '#ff4757', '#74b9ff', '#a29bfe', '#ffeaa7', '#fab1a0', '#fd79a8', '#55efc4'];

        // Kumpulan kata-kata romantis/ucapan dari kamu
        const messages = [
            "Selamat ulang tahun ya! Terima kasih sudah hadir dan jadi bagian terindah di hidupku. ❤️",
            "Di hari spesialmu ini, aku berharap semua kebaikan dan kebahagiaan selalu menyertaimu. Kamu berharga banget!",
            "Coba pecahin balon yang lain, siapa tahu ada kejutan kata-kata lagi dari aku buat kamu. 🎈",
            "I love you more than words can say. Selamat tanggal 1 Juni, Sayang! ✨"
        ];

        let messageIndex = 0;

        // Fungsi membuat balon secara acak
        function createBalloon() {
            const balloon = document.createElement('div');
            balloon.classList.add('balloon');

            // Set warna acak
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            balloon.style.backgroundColor = randomColor;
            balloon.style.boxShadow = `inset -7px -7px 10px rgba(0,0,0,0.1), 0px 5px 10px ${randomColor}88`;

            // Posisi horizontal acak (0% sampai 90% lebar layar)
            balloon.style.left = Math.random() * 90 + '%';

            // Durasi naik acak (biar ada yang cepat dan lambat, antara 6s sampai 12s)
            const duration = Math.random() * 6 + 6;
            balloon.style.animationDuration = duration + 's';

            // Menentukan apakah balon ini membawa surat (peluang 30%)
            const hasLetter = Math.random() < 0.3;
            if (hasLetter) {
                balloon.classList.add('has-letter');
                
                // Simpan pesan tertentu ke dalam balon ini
                const currentMessage = messages[messageIndex % messages.length];
                balloon.dataset.message = currentMessage;
                messageIndex++; // Bergeser ke pesan berikutnya untuk balon selanjutnya
            }

            // Event saat balon di-klik
            balloon.addEventListener('click', (e) => {
                e.stopPropagation(); // Mencegah trigger klik pada body
                
                if (balloon.classList.contains('has-letter')) {
                    // Tampilkan pesan
                    secretText.innerText = balloon.dataset.message;
                    overlay.style.display = 'flex';
                    setTimeout(() => overlay.classList.add('show'), 10);
                }
                
                // Efek Pecah (balon langsung hilang)
                balloon.remove();
            });

            // Hapus balon jika sudah melewati layar atas agar browser tidak lemot
            balloon.addEventListener('animationend', () => {
                balloon.remove();
            });

            container.appendChild(balloon);
        }

        // Loop untuk terus memproduksi balon setiap 800 milidetik
        setInterval(createBalloon, 800);

        // Event klik di mana saja pada overlay untuk menutup pesan dan kembali ke animasi awal
        overlay.addEventListener('click', () => {
            overlay.classList.remove('show');
            setTimeout(() => overlay.style.display = 'none', 300);
        });
    </script>
</body>
</html>
