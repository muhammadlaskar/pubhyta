<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sayang! 🎈</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-image: url('BEBEK (1).jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            overflow: hidden;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }

        /* Teks Ucapan di Tengah Halaman */
        .center-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.8rem;
            font-weight: bold;
            color: #ffffff;
            text-align: center;
            z-index: 10;
            pointer-events: none;
            text-shadow: 2px 4px 10px rgba(0, 0, 0, 0.3);
            font-family: 'Comic Sans MS', cursive, sans-serif;
            animation: pulse 2s ease-in-out infinite;
            width: 90%;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
        }

        /* Dekorasi Bunga Pink di Sudut */
        .flower {
            position: absolute;
            font-size: 50px;
            z-index: 15;
            pointer-events: none;
            animation: spinFlower 6s linear infinite;
            user-select: none;
        }

        .top-left { top: 20px; left: 20px; }
        .top-right { top: 20px; right: 20px; }
        .bottom-left { bottom: 20px; left: 20px; }
        .bottom-right { bottom: 20px; right: 20px; }

        @keyframes spinFlower {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Container Balon */
        #balloon-container {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            top: 0;
            left: 0;
        }

        /* Style Dasar Balon - UKURAN DIPERBESAR & 3D GRADIENT */
        .balloon {
            position: absolute;
            width: 90px;
            height: 115px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            bottom: -300px;
            cursor: pointer;
            animation: floatUp 15s linear infinite;
            z-index: 5;
            transform-origin: bottom center;
            transition: transform 0.15s ease-out, opacity 0.15s ease-out;
        }

        /* Hiasan Pantulan Cahaya di Balon (Glossy Effect) */
        .balloon::before {
            content: "";
            position: absolute;
            top: 12px;
            left: 15px;
            width: 25px;
            height: 15px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            transform: rotate(-30deg);
        }

        /* Tali Balon 120px - Di-center secara presisi */
        .balloon-string {
            position: absolute;
            bottom: -120px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 120px;
            background-color: rgba(255, 255, 255, 0.75);
            pointer-events: none;
        }

        /* Gulungan Surat di Ujung Tali */
        .scroll-icon {
            position: absolute;
            bottom: -140px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 22px;
            z-index: 6;
            animation: dangle 1.5s ease-in-out infinite alternate;
            transform-origin: top center;
            pointer-events: none;
        }

        /* Animasi Pecah Balon (Pop) */
        .balloon.pop-animation {
            animation: balloonPop 0.15s ease-out forwards !important;
        }

        @keyframes balloonPop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.8; }
            100% { transform: scale(0); opacity: 0; }
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-145vh) rotate(15deg); opacity: 0; }
        }

        @keyframes dangle {
            0% { transform: translateX(-50%) rotate(-10deg); }
            100% { transform: translateX(-50%) rotate(10deg); }
        }

        /* Overlay Pop-up Surat */
        #letter-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            cursor: pointer;
        }

        .letter-content {
            background: #fffdf0;
            padding: 40px 30px;
            border-radius: 20px;
            max-width: 85%;
            width: 450px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border: 3px dashed #ff9ff3;
            transform: scale(0.7);
            transition: transform 0.3s ease;
        }

        #letter-overlay.show .letter-content { transform: scale(1); }

        .letter-content p {
            font-size: 1.3rem;
            color: #2c2c54;
            line-height: 1.6;
            font-weight: bold;
        }

        .hint { margin-top: 20px; font-size: 0.9rem; color: #ff9ff3; font-weight: normal; }
    </style>
</head>
<body>

    <div class="center-text">HAPPY BIRTHDAY SAYANGGG</div>

    <div class="flower top-left">🌸</div>
    <div class="flower top-right">🌸</div>
    <div class="flower bottom-left">🌸</div>
    <div class="flower bottom-right">🌸</div>

    <div id="balloon-container"></div>

    <div id="letter-overlay">
        <div class="letter-content">
            <p id="secret-text"></p>
            <div class="hint">Klik di mana saja untuk kembali</div>
        </div>
    </div>

    <script>
        const container = document.getElementById('balloon-container');
        const overlay = document.getElementById('letter-overlay');
        const secretText = document.getElementById('secret-text');

        // Hex warna dasar balon untuk kalkulasi warna tajam 3D
        const baseColors = ['#ff3838', '#ff1f5a', '#1e90ff', '#6c5ce7', '#ffa502', '#ff6b81', '#ff4757', '#2ed573', '#ff781f'];

        const messages = [
            "SELAMAT ULANG TAHUN YANG KE 21 SAYANGKUUUU, SEMOGAAA SEMUA YANG DI INGINKANN SAYANGKUUU CEPAT TERJADII YAAAA. ❤️",
            "SEMANGATTT TERUSSS ORANG HEBATKUUUU, DILANCARKANNN SEGAANYAAAA",
            "LOVEEE YOUUU, LOVEEE YOUUUU LOVEEE YOUUU, LOVEEEE YOUUU SOO MUCHHHH SAYANGGGGGGG. ❤️",
            "SAYANGGG, KAMUU ORANGG HEBATTTT BANGETTTTTTT! ✨"
        ];

        let messageIndex = 0;

        function createBalloon() {
            // Kita bungkus balon dan tali dalam satu wrapper div agar bergerak bersama secara lurus
            const wrapper = document.createElement('div');
            wrapper.style.position = 'absolute';
            wrapper.style.bottom = '-300px';
            wrapper.style.left = Math.random() * 85 + '%';
            
            const duration = Math.random() * 5 + 10;
            wrapper.style.animation = `floatUp ${duration}s linear infinite`;

            const balloon = document.createElement('div');
            balloon.classList.add('balloon');

            // Warna tajam menggunakan Radial Gradient (Efek Menggelembung 3D)
            const color = baseColors[Math.floor(Math.random() * baseColors.length)];
            balloon.style.background = `radial-gradient(circle at 30% 30%, #ffffff 0%, ${color} 20%, #000000 100%)`;
            balloon.style.boxShadow = `inset -10px -10px 20px rgba(0,0,0,0.4), 0px 12px 20px rgba(0,0,0,0.3)`;

            // Buat tali lurus secara terpisah agar rapi
            const string = document.createElement('div');
            string.classList.add('balloon-string');
            wrapper.appendChild(string);

            const hasLetter = Math.random() < 0.5;
            if (hasLetter) {
                const scrollIcon = document.createElement('div');
                scrollIcon.classList.add('scroll-icon');
                scrollIcon.innerText = "📜";
                wrapper.appendChild(scrollIcon);

                const currentMessage = messages[messageIndex % messages.length];
                balloon.dataset.message = currentMessage;
                balloon.dataset.hasLetter = "true";
                messageIndex++;
            }

            // Event saat balon di-klik
            balloon.addEventListener('click', (e) => {
                e.stopPropagation();
                
                // Trigger animasi pop pecah balon
                balloon.classList.add('pop-animation');
                string.style.opacity = '0';
                const scroll = wrapper.querySelector('.scroll-icon');
                if(scroll) scroll.style.opacity = '0';

                // Tunggu animasi pecah selesai (0.15 detik) baru munculkan pop-up teks
                setTimeout(() => {
                    if (balloon.dataset.hasLetter === "true") {
                        secretText.innerText = balloon.dataset.message;
                        overlay.style.display = 'flex';
                        setTimeout(() => overlay.classList.add('show'), 10);
                    }
                    wrapper.remove();
                }, 150);
            });

            wrapper.addEventListener('animationend', () => {
                wrapper.remove();
            });

            wrapper.appendChild(balloon);
            container.appendChild(wrapper);
        }

        setInterval(createBalloon, 2500);

        overlay.addEventListener('click', () => {
            overlay.classList.remove('show');
            setTimeout(() => overlay.style.display = 'none', 300);
        });
    </script>
</body>
</html>
