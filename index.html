<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sayang! 🎈</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            overflow: hidden;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            background-color: #f7f1e3;
        }

        /* SISTEM HALAMAN */
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }

        /* HALAMAN 1 (Aktif di Awal) */
        #page1 {
            display: block;
            background-image: url('BEBEK (1).jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* HALAMAN 2 (Countdown dengan Background hal 2.jpeg) */
        #page2 {
            background-image: url('hal 2.jpeg'); /* Menggunakan file gambar yang kamu unggah */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: none; 
            justify-content: center;
            align-items: center;
            flex-direction: column;
            position: relative;
        }

        /* Teks Ucapan Tengah Halaman 1 */
        .center-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.8rem;
            font-weight: bold;
            color: #ffffff;
            text-align: center;
            z-index: 10;
            pointer-events: none;
            text-shadow: 2px 4px 10px rgba(0, 0, 0, 0.3);
            font-family: 'Comic Sans MS', cursive, sans-serif;
            width: 90%;
        }

        /* BINGKAI TEPI BUNGA */
        .flower-border {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
            display: flex;
            justify-content: space-between;
            box-sizing: border-box;
        }

        .flower-row {
            position: absolute;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
        }
        .flower-row.top { top: 0; }
        .flower-row.bottom { bottom: 0; }

        .flower-column {
            position: absolute;
            top: 60px;
            bottom: 60px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }
        .flower-column.left { left: 15px; }
        .flower-column.right { right: 15px; }

        .flower-border span {
            display: inline-block;
            font-size: 35px;
            animation: spinFlower 6s linear infinite;
            user-select: none;
        }

        @keyframes spinFlower {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* CONTAINER BALON */
        #balloon-container {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            top: 0;
            left: 0;
        }

        /* STYLE BALON */
        .balloon {
            position: absolute;
            width: 90px;
            height: 115px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            bottom: -300px;
            cursor: pointer;
            z-index: 5;
            transform-origin: bottom center;
            transition: transform 0.15s ease-out, opacity 0.15s ease-out;
        }

        .balloon::before {
            content: "";
            position: absolute;
            top: 12px;
            left: 15px;
            width: 25px;
            height: 15px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            transform: rotate(-30deg);
            pointer-events: none;
        }

        .balloon-string {
            position: absolute;
            bottom: -120px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 120px;
            background-color: rgba(255, 255, 255, 0.8);
            pointer-events: none;
        }

        .scroll-icon {
            position: absolute;
            bottom: -145px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 22px;
            z-index: 6;
            animation: dangle 1.5s ease-in-out infinite alternate;
            transform-origin: top center;
            pointer-events: none;
        }

        @keyframes floatUpAnimation {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            85% { opacity: 1; }
            100% { transform: translateY(-160vh) rotate(10deg); opacity: 0; }
        }

        .balloon.pop-animation {
            animation: balloonPop 0.15s ease-out forwards !important;
        }

        @keyframes balloonPop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }

        @keyframes dangle {
            0% { transform: translateX(-50%) rotate(-8deg); }
            100% { transform: translateX(-50%) rotate(8deg); }
        }

        /* OVERLAY MEMO */
        #letter-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            cursor: pointer;
        }

        .letter-content {
            background: #fffdf0;
            padding: 40px 30px;
            border-radius: 20px;
            max-width: 85%;
            width: 450px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border: 3px dashed #ff9ff3;
            transform: scale(0.7);
            transition: transform 0.3s ease;
        }

        #letter-overlay.show .letter-content { transform: scale(1); }

        .letter-content p {
            font-size: 1.3rem;
            color: #2c2c54;
            line-height: 1.6;
            font-weight: bold;
        }

        .hint { margin-top: 20px; font-size: 0.9rem; color: #ff9ff3; font-weight: normal; }

        .next-btn {
            display: none; 
            margin: 25px auto 0 auto;
            padding: 12px 35px;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
            transition: transform 0.2s, background-color 0.2s;
        }

        .next-btn:hover {
            background-color: #ff6b81;
            transform: scale(1.05);
        }

        /* ================= STYLE COUNTDOWN HALAMAN 2 ================= */
        .countdown-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 35px 25px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            border: 3px dashed #ffb6c1;
            max-width: 90%;
            width: 500px;
            z-index: 10;
        }

        .countdown-container h2 {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            color: #ff4757;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .countdown-container p {
            color: #555;
            font-size: 1rem;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .timer-box {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .time-segment {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 75px;
        }

        .time-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #2c2c54;
            background: #ffffff;
            width: 100%;
            padding: 5px 0;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            font-family: monospace;
        }

        .time-label {
            font-size: 0.85rem;
            font-weight: bold;
            color: #ff6b81;
            margin-top: 8px;
            text-transform: uppercase;
        }

        /* Tombol Buka Setelah Hitung Mundur Selesai */
        .unlock-btn {
            display: none;
            margin-top: 20px;
            padding: 15px 40px;
            background-color: #2ed573;
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(46, 213, 115, 0.4);
            animation: pulseBtn 1.5s infinite alternate;
        }

        @keyframes pulseBtn {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }
    </style>
</head>
<body>

    <div id="page1" class="page">
        <div class="center-text">HAPPY BIRTHDAY SAYANGGG</div>

        <div class="flower-border">
            <div class="flower-row top" id="row-top"></div>
            <div class="flower-column left" id="col-left"></div>
            <div class="flower-column right" id="col-right"></div>
            <div class="flower-row bottom" id="row-bottom"></div>
        </div>

        <div id="balloon-container"></div>
    </div>

    <div id="page2" class="page">
        <div class="countdown-container">
            <h2>Sabar Yaa Sayangkuuu... 💜</h2>
            <p>Kado utamamu baru bisa dibuka pada hari Sabtu, 6 Juni jam 15.00 WIB!</p>
            
            <div class="timer-box" id="timer-display">
                <div class="time-segment">
                    <span class="time-number" id="days">00</span>
                    <span class="time-label">Hari</span>
                </div>
                <div class="time-segment">
                    <span class="time-number" id="hours">00</span>
                    <span class="time-label">Jam</span>
                </div>
                <div class="time-segment">
                    <span class="time-number" id="minutes">00</span>
                    <span class="time-label">Menit</span>
                </div>
                <div class="time-segment">
                    <span class="time-number" id="seconds">00</span>
                    <span class="time-label">Detik</span>
                </div>
            </div>

            <button class="unlock-btn" id="scbk-open-btn" onclick="alert('Membuka scrapbook cerita kita... ✨📖')">Buka Isi Scrapbook! 📖</button>
        </div>
    </div>

    <div id="letter-overlay">
        <div class="letter-content" onclick="event.stopPropagation()">
            <p id="secret-text"></p>
            <button id="next-page-btn" class="next-btn">Next &rarr;</button>
            <div class="hint" id="close-hint">Klik di mana saja untuk kembali</div>
        </div>
    </div>

    <script>
        // GENERATOR BINGKAI BUNGA TEPI HALAMAN
        function generateFlowerBorder() {
            const rowTop = document.getElementById('row-top');
            const rowBottom = document.getElementById('row-bottom');
            const colLeft = document.getElementById('col-left');
            const colRight = document.getElementById('col-right');

            const horizontalCount = 12; 
            const verticalCount = 5;

            for (let i = 0; i < horizontalCount; i++) {
                rowTop.innerHTML += '<span>🌸</span>';
                rowBottom.innerHTML += '<span>🌸</span>';
            }
            for (let i = 0; i < verticalCount; i++) {
                colLeft.innerHTML += '<span>🌸</span>';
                colRight.innerHTML += '<span>🌸</span>';
            }
        }
        generateFlowerBorder();

        // LOGIKA UTAMA BALON
        const container = document.getElementById('balloon-container');
        const overlay = document.getElementById('letter-overlay');
        const secretText = document.getElementById('secret-text');
        const nextPageBtn = document.getElementById('next-page-btn');
        const closeHint = document.getElementById('close-hint');

        const baseColors = ['#ff3838', '#ff1f5a', '#1e90ff', '#6c5ce7', '#ffa502', '#ff6b81', '#ff4757', '#2ed573', '#ff781f'];
        const messages = [
            "SELAMAT ULANG TAHUN YANG KE 21 SAYANGKUUUU, SEMOGAAA SEMUA YANG DI INGINKANN SAYANGKUUU CEPAT TERJADII YAAAA. ❤️",
            "SEMANGATTT TERUSSS ORANG HEBATKUUUU, DILANCARKANNN SEGAANYAAAA",
            "LOVEEE YOUUU, LOVEEE YOUUUU LOVEEE YOUUU, LOVEEEE YOUUU SOO MUCHHHH SAYANGGGGGGG. ❤️",
            "SAYANGGG, KAMUU ORANGG HEBATTTT BANGETTTTTTT! ✨"
        ];

        let messageIndex = 0;
        const MAX_BALLOONS = 5; 

        function createNormalBalloon() {
            if (container.children.length >= MAX_BALLOONS) return; 

            const balloon = document.createElement('div');
            balloon.classList.add('balloon');
            balloon.style.left = (Math.random() * 70 + 15) + '%';

            const duration = Math.random() * 3 + 15;
            balloon.style.animation = `floatUpAnimation ${duration}s linear forwards`;

            const color = baseColors[Math.floor(Math.random() * baseColors.length)];
            balloon.style.background = `radial-gradient(circle at 30% 30%, #ffffff 0%, ${color} 20%, #000000 100%)`;
            balloon.style.boxShadow = `inset -10px -10px 20px rgba(0,0,0,0.4), 0px 12px 20px rgba(0,0,0,0.3)`;

            const string = document.createElement('div');
            string.classList.add('balloon-string');
            balloon.appendChild(string);

            const hasLetter = Math.random() < 0.5;
            if (hasLetter) {
                const scrollIcon = document.createElement('div');
                scrollIcon.classList.add('scroll-icon');
                scrollIcon.innerText = "📜";
                balloon.appendChild(scrollIcon);

                balloon.dataset.message = messages[messageIndex % messages.length];
                balloon.dataset.type = "letter";
                messageIndex++;
            }

            setupBalloonClick(balloon);
            container.appendChild(balloon);
        }

        function createGiftBalloon() {
            if (container.children.length >= MAX_BALLOONS) return;

            const balloon = document.createElement('div');
            balloon.classList.add('balloon');
            balloon.style.left = (Math.random() * 70 + 15) + '%';

            const duration = Math.random() * 3 + 15;
            balloon.style.animation = `floatUpAnimation ${duration}s linear forwards`;

            balloon.style.background = `radial-gradient(circle at 30% 30%, #ffffff 0%, #ffd700 30%, #b8860b 100%)`;
            balloon.style.boxShadow = `inset -10px -10px 20px rgba(0,0,0,0.4), 0px 12px 25px rgba(218, 165, 32, 0.5)`;

            const string = document.createElement('div');
            string.classList.add('balloon-string');
            balloon.appendChild(string);

            const giftIcon = document.createElement('div');
            giftIcon.classList.add('scroll-icon');
            giftIcon.innerText = "🎁";
            balloon.appendChild(giftIcon);

            balloon.dataset.message = "YAYYYYY, SELAMATTT SAYANGKUUUUU";
            balloon.dataset.type = "gift";

            setupBalloonClick(balloon);
            container.appendChild(balloon);
        }

        function setupBalloonClick(balloon) {
            balloon.addEventListener('click', (e) => {
                e.stopPropagation();
                balloon.classList.add('pop-animation');

                setTimeout(() => {
                    if (balloon.dataset.message) {
                        secretText.innerText = balloon.dataset.message;
                        
                        if (balloon.dataset.type === "gift") {
                            nextPageBtn.style.display = "block";
                            closeHint.style.display = "none";
                        } else {
                            nextPageBtn.style.display = "none";
                            closeHint.style.display = "block";
                        }

                        overlay.style.display = 'flex';
                        setTimeout(() => overlay.classList.add('show'), 10);
                    }
                    balloon.remove(); 
                }, 150);
            });

            balloon.addEventListener('animationend', () => {
                balloon.remove();
            });
        }

        setInterval(createNormalBalloon, 3000);
        setInterval(createGiftBalloon, 5000);

        nextPageBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            overlay.classList.remove('show');
            overlay.style.display = 'none';
            
            document.getElementById('page1').style.display = 'none';
            document.getElementById('page2').style.display = 'flex';
            
            // JALANKAN LOGIKA COUNTDOWN BEGITU HALAMAN 2 DIBUKA
            startCountdown();
        });

        overlay.addEventListener('click', () => {
            if (nextPageBtn.style.display !== "block") {
                overlay.classList.remove('show');
                setTimeout(() => overlay.style.display = 'none', 300);
            }
        });


        // ================= LOGIKA COUNTDOWN REAL-TIME =================
        function startCountdown() {
            // Target: Sabtu, 6 Juni 2026 jam 15:00:00 WIB
            const targetDate = new Date("June 6, 2026 15:00:00").getTime();

            const timerInterval = setInterval(() => {
                const now = new Date().getTime();
                const difference = targetDate - now;

                // Perhitungan waktu Matematika dasar (Hari, Jam, Menit, Detik)
                const d = Math.floor(difference / (1000 * 60 * 60 * 24));
                const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((difference % (1000 * 60)) / 1000);

                // Update angka di layar dengan format 2 digit (01, 02, dst)
                document.getElementById("days").innerText = d < 10 ? "0" + d : d;
                document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
                document.getElementById("minutes").innerText = m < 10 ? "0" + m : m;
                document.getElementById("seconds").innerText = s < 10 ? "0" + s : s;

                // KONDISI JIKA WAKTU HABIS (SUDAH TANGGAL 6 JUNI JAM 15.00)
                if (difference < 0) {
                    clearInterval(timerInterval);
                    
                    // Sembunyikan timer kotak angka
                    document.getElementById("timer-display").style.display = "none";
                    
                    // Ubah teks instruksi
                    document.querySelector(".countdown-container p").innerText = "Waktunya telah tibaaa! Klik tombol di bawah untuk membukanya! ❤️";
                    
                    // Munculkan tombol utama pembuka scrapbook
                    document.getElementById("scbk-open-btn").style.display = "inline-block";
                }
            }, 1000);
        }
    </script>
</body>
</html>
